
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; --border: #242933; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; cursor: pointer; border: none; background: none; }
        .section-title { font-size: 13px; color: #8a94ad; text-transform: uppercase; margin: 20px 0 10px 5px; }
        .settings-list { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid var(--border); }
        .setting-item:last-child { border-bottom: none; }
        .status-badge { background: rgba(196, 255, 0, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .btn-logout { width: 100%; margin-top: 30px; padding: 16px; background: transparent; color: var(--red); border: 1px solid var(--red); border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='parametres.html'">‹</button>
        <span style="font-weight:bold;">Sécurité du Compte</span>
    </div>

    <div class="section-title">Paramètres d'accès</div>
    <div class="settings-list">
        <div class="setting-item">
            <span>Mot de passe</span>
            <span style="color:#5c667a;">›</span>
        </div>
        <div class="setting-item">
            <span>Double Authentification</span>
            <span class="status-badge">ACTIF</span>
        </div>
    </div>

    <div class="section-title">Retrait</div>
    <div class="settings-list">
        <div class="setting-item">
            <span>Adresse BEP20</span>
            <span style="color:#5c667a;">›</span>
        </div>
    </div>

    <button class="btn-logout" onclick="logout()">Se déconnecter</button>

    <script>
        function logout() {
            if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
