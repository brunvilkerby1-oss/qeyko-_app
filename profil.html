<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Utilisateur - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; --border: #242933; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; }

        .profile-card { background: var(--card); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid var(--border); }
        .avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: black; font-weight: bold; }
        
        .user-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .user-id { font-size: 12px; color: #8a94ad; margin-bottom: 20px; }

        .info-list { text-align: left; margin-top: 20px; }
        .info-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .info-label { color: #8a94ad; }
        .info-value { font-weight: bold; color: white; }
        .status-active { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="parametres.html" class="back-btn">‹</a>
        <span style="font-weight:bold;">Profil Utilisateur</span>
    </div>

    <div class="profile-card">
        <div class="avatar" id="avatar-initial">U</div>
        <div class="user-name" id="user-display-name">Utilisateur Qeyko</div>
        <div class="user-id">ID: 59384022</div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-label">Statut du compte</span>
                <span class="info-value status-active">Actif ✅</span>
            </div>
            <div class="info-item">
                <span class="info-label">Niveau de Minage</span>
                <span class="info-value" id="user-vip-level">VIP 0 (Gratuit)</span>
            </div>
            <div class="info-item">
                <span class="info-label">Membre depuis</span>
                <span class="info-value">Avril 2026</span>
            </div>
        </div>
    </div>

    <script>
        // Lojik pou montre nivo VIP a otomatikman selon depo a
        const currentVip = localStorage.getItem('user_vip_level');
        if (currentVip) {
            document.getElementById('user-vip-level').innerText = currentVip;
            document.getElementById('user-vip-level').style.color = "#c4ff00";
        }
    </script>

</body>
</html>
