<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Levels - Qeyko</title>
    <style>
        body { background-color: #0a0e1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .vip-card { background: #161b2d; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #2e3755; text-align: left; position: relative; }
        .vip-name { font-size: 18px; font-weight: bold; color: #00d2ff; }
        .vip-price { font-size: 22px; margin: 5px 0; color: #fff; }
        .vip-profit { color: #00ff88; font-size: 14px; font-weight: bold; }
        .buy-btn { background: linear-gradient(90deg, #2575fc, #6a11cb); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; position: absolute; right: 15px; bottom: 20px; font-size: 13px; }
        .locked { background: #0f1424; border: 1px dashed #4e5a78; opacity: 0.7; }
        .locked .buy-btn { background: #333; pointer-events: none; }
        .back-btn { display: block; margin: 20px auto; color: #8a94ad; text-decoration: none; border: 1px solid #2e3755; padding: 10px; width: 100px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #fff;">Packs VIP Mining</h2>
    <div class="vip-card">
        <div class="vip-name">VIP 1</div>
        <div class="vip-price">10 USDT</div>
        <div class="vip-profit">Revenu: 1.20 USDT/jou</div>
        <a href="recharge.html" class="buy-btn">Achte</a>
    </div>
    <div class="vip-card locked">

        <div class="vip-price">7,000 USDT</div>
        <div class="vip-profit">Indisponible</div>
        <a href="#" class="buy-btn">Fèmen</a>
    </div>
    <a href="index.html" class="back-btn">Retounen</a>
</body>
</html>
