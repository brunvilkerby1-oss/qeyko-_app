
<div class="vip-list" id="vip-container">
    </div>

<script>
    const vips = [
        { id: 1, invest: 10, profit: 1.00, status: "available" },
        { id: 2, invest: 12, profit: 1.80, status: "available" },
        { id: 3, invest: 20, profit: 2.50, status: "available" },
        { id: 4, invest: 30, profit: 3.50, status: "available" },
        { id: 5, invest: 50, profit: 6.00, status: "available" },
        { id: 6, invest: "???", profit: 0, status: "locked" },
        { id: 7, invest: "???", profit: 0, status: "locked" },
        { id: 8, invest: "???", profit: 0, status: "locked" }
    ];

    function renderVips() {
        const container = document.getElementById('vip-container');
        vips.forEach(vip => {
            const isLocked = vip.status === "locked";
            const card = document.createElement('div');
            card.className = 'vip-card';
            
            card.innerHTML = `
                <div class="vip-info" style="${isLocked ? 'opacity: 0.5' : ''}">
                    <h3>VIP ${vip.id}</h3>
                    <div class="vip-details">
                        ${isLocked ? '<b>Bientôt disponible</b>' : `Investissement : <b>${vip.invest} USDT</b><br>Gain : <b>${vip.profit.toFixed(2)} USDT / jour</b>`}
                    </div>
                </div>
                <button class="buy-btn ${isLocked ? 'btn-locked' : 'btn-ready'}" 
                        ${isLocked ? 'disabled' : `onclick="selectVip(${vip.id}, ${vip.invest})"`}>
                    ${isLocked ? 'Verrouillé' : 'Activer'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    function selectVip(id, price) {
        window.location.href = `recharger.html?amount=${price}&vip=${id}`;
    }

    window.onload = renderVips;
</script>
