<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP - Qeyko</title>
    <style>
        body { background: #090b10; color: white; font-family: sans-serif; padding: 20px; }
        .back-btn { color: #c4ff00; text-decoration: none; font-size: 20px; display: block; margin-bottom: 20px; }
        .vip-card { background: #1a1d26; border: 1px solid #c4ff0033; border-radius: 20px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #c4ff00; color: black; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }
        .active-txt { color: #00ff88; font-weight: bold; border: 1px solid #00ff88; padding: 5px 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Retour</a>
    <h2>Packs VIP</h2>

    <div id="vip-list"></div>

    <script>
        const vips = [
            { id: 'VIP 1', price: 10, profit: 1.00 },
            { id: 'VIP 2', price: 12, profit: 1.80 },
            { id: 'VIP 3', price: 25, profit: 3.00 },
            { id: 'VIP 4', price: 50, profit: 4.00 },
            { id: 'VIP 5', price: 100, profit: 10.00 }
        ];

        function loadVIPs() {
            const container = document.getElementById('vip-list');
            const activeVip = localStorage.getItem('active_vip');
            // Nou simulation balans lan (pou tès)
            const balance = parseFloat(localStorage.getItem('user_balance') || "0"); 

            vips.forEach(vip => {
                const isCurrent = activeVip === vip.id;
                const canAfford = balance >= vip.price;
                
                container.innerHTML += `
                    <div class="vip-card">
                        <div>
                            <b style="color:#c4ff00">${vip.id}</b><br>
                            <small>${vip.price} USDT | ${vip.profit} USDT/j</small>
                        </div>
                        ${isCurrent ? 
                            `<span class="active-txt">ACTIF</span>` : 
                            `<button class="buy-btn" ${!canAfford ? 'disabled' : ''} onclick="buyVip('${vip.id}')">
                                ${canAfford ? 'ACTIVER' : 'MIN 1.00'}
                            </button>`
                        }
                    </div>`;
            });
        }

        function buyVip(id) {
            localStorage.setItem('active_vip', id);
            alert("VIP " + id + " activé !");
            location.reload();
        }

        window.onload = loadVIPs;
    </script>
</body>
</html>
