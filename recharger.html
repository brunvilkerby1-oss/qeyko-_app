
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharger Sélectionner</title>
    <style>
        body { background-color: #1a1d26; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .back-btn { font-size: 26px; text-decoration: none; color: white; margin-right: 30px; cursor: pointer; }
        .title { font-size: 18px; font-weight: bold; }
        
        .list-container { background: #242936; border-radius: 15px; overflow: hidden; border: 1px solid #3d4452; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2d3340; text-decoration: none; color: white; transition: 0.2s; cursor: pointer; }
        .item:active { background: #2d3340; }
        .logo { width: 32px; height: 32px; margin-right: 15px; border-radius: 50%; }
        .name { flex-grow: 1; font-size: 14px; font-weight: bold; }
        .arrow { color: #8a94ad; font-size: 18px; }

        /* Seksyon adrès ki kache a */
        #address-section { display: none; background: #1a1d26; padding: 20px; text-align: center; border-top: 1px solid #3d4452; animation: slideDown 0.3s ease-out; }
        .address-box { background: #242936; border: 1px dashed #c4ff00; padding: 15px; border-radius: 12px; word-break: break-all; color: #c4ff00; font-family: monospace; font-size: 13px; margin: 15px 0; line-height: 1.4; }
        .copy-btn { background: #c4ff00; color: black; border: none; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; font-size: 14px; }
        .warning-text { font-size: 11px; color: #8a94ad; margin-bottom: 10px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span class="title">Recharger Sélectionner</span>
    </div>

    <div class="list-container">
        <div class="item" onclick="toggleAddr()">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="logo">
            <span class="name">BEP20-USDT</span>
            <span class="arrow">▼</span>
        </div>
        
        <div id="address-section">
            <p class="warning-text">Veuillez envoyer uniquement des <b>USDT (BEP20)</b> à cette adresse. Les autres actifs ne seront pas récupérés.</p>
            <div class="address-box" id="wallet-addr">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</div>
            <button class="copy-btn" onclick="copyAddress()">COPIER L'ADRESSE</button>
        </div>

        <div class="item"><img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="logo"><span class="name">BEP20-USDC</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="logo"><span class="name">BNB (Binance Smart Chain)</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/tron-trx-logo.png" class="logo"><span class="name">TRC20-USDT</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="logo"><span class="name">ETH (ERC20)</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/polygon-matic-logo.png" class="logo"><span class="name">POLYGON-USDT</span><span class="arrow">›</span></div>
    </div>

    <script>
        function toggleAddr() {
            const section = document.getElementById('address-section');
            if (section.style.display === 'block') {
                section.style.display = 'none';
            } else {
                section.style.display = 'block';
            }
        }

        function copyAddress() {
            const addr = document.getElementById('wallet-addr').innerText;
            navigator.clipboard.writeText(addr).then(() => {
                alert("Adresse copiée avec succès !");
            }).catch(err => {
                console.error('Erreur de copie : ', err);
            });
        }
    </script>
</body>
</html>
