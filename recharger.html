<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharger Sélectionner</title>
    <style>
        body { background-color: #1a1d26; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 20px; text-decoration: none; color: white; margin-right: 60px; }
        .list-container { background: #242936; border-radius: 15px; overflow: hidden; border: 1px solid #3d4452; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2d3340; text-decoration: none; color: white; transition: 0.3s; }
        .item:active { background: #2d3340; }
        .logo { width: 30px; height: 30px; margin-right: 15px; border-radius: 50%; }
        .name { flex-grow: 1; font-size: 14px; font-weight: bold; }
        .arrow { color: #8a94ad; font-size: 18px; }
        #address-display { display: none; background: #1a1d26; padding: 20px; text-align: center; border-radius: 15px; margin-top: 10px; border: 1px dashed #c4ff00; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span>Recharger Sélectionner</span>
    </div>

    <div class="list-container">
        <a href="javascript:void(0)" class="item" onclick="showAddr()">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="logo">
            <span class="name">BEP20-USDT</span>
            <span class="arrow">›</span>
        </a>
        <div id="address-display">
            <p style="font-size: 11px; color: #8a94ad;">Adrès USDT (BEP20) pa ou:</p>
            <strong style="word-break: break-all; color: #c4ff00; font-size: 13px;">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</strong>
            <button onclick="copyAddr()" style="margin-top:10px; background:#c4ff00; border:none; padding:5px 15px; border-radius:5px; font-weight:bold;">Kopye</button>
        </div>

        <div class="item"><img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" class="logo"><span class="name">BEP20-USDC</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="logo"><span class="name">BNB</span><span class="arrow">›</span></div>
        <div class="item"><img src="https://cryptologos.cc/logos/tron-trx-logo.png" class="logo"><span class="name">TRC20-USDT</span><span class="arrow">›</span></div>
    </div>

    <script>
        function showAddr() { document.getElementById('address-display').style.display = 'block'; }
        function copyAddr() {
            navigator.clipboard.writeText("0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396");
            alert("Adrès kopye!");
        }
    </script>
</body>
</html>
