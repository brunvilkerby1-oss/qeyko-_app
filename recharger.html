<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge USDT - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg-dark: #090b10; --card-bg: rgba(26, 29, 38, 0.9); --border: rgba(196, 255, 0, 0.2); --text-sec: #8a94ad; }
        body { background: radial-gradient(circle at top, #1a1d26, #090b10); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 20px; background: rgba(196, 255, 0, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid var(--border); }

        .address-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 25px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        .crypto-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .crypto-icons img { width: 35px; height: 35px; filter: drop-shadow(0 0 5px rgba(196, 255, 0, 0.2)); }

        .wallet-box { background: rgba(0,0,0,0.3); padding: 18px; border-radius: 15px; font-family: monospace; font-size: 12px; color: var(--primary); word-break: break-all; margin: 15px 0; border: 1px dashed var(--border); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 18px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(196, 255, 0, 0.05); }

        .finish-btn { width: 100%; background: var(--primary); color: black; border: none; padding: 20px; border-radius: 22px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 10px 25px rgba(196, 255, 0, 0.3); }
        .finish-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"> < </a>
        <h2 style="margin:0; font-size: 20px;">Recharger USDT</h2>
    </div>

    <div class="address-card">
        <div class="crypto-icons">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" alt="BNB">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" alt="BTC">
        </div>
        <div class="stat-label" style="font-size: 11px; color: var(--text-sec);">ADRESSE DE DÉPÔT (BEP20)</div>
        <div class="wallet-box" id="wallet-addr">0x9791D68C72B9197B0D36D619A0A89D3C6E5186E9</div>
        <button onclick="copyAddr()" style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 8px 20px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold;">Copier l'adresse</button>
    </div>

    <div class="input-group">
        <label>Montant envoyé (USDT)</label>
        <input type="number" id="deposit-amount" placeholder="Ex: 100">
    </div>

    <div class="input-group">
        <label>ID de Transaction / Nom d'utilisateur</label>
        <input type="text" id="transaction-id" placeholder="ID de la transaction">
    </div>

    <button class="finish-btn" onclick="sendToAdmin()">J'ai déjà envoyé (Terminé)</button>

    <div style="text-align: center; font-size: 11px; color: var(--text-sec); margin-top: 20px;">
        ⚠️ Seul le réseau <b>BEP20</b> est accepté.
    </div>

    <script>
        function copyAddr() {
            const addr = document.getElementById('wallet-addr').innerText;
            navigator.clipboard.writeText(addr);
            alert("Adresse copiée avec succès !");
        }

        function sendToAdmin() {
            const amount = document.getElementById('deposit-amount').value;
            const txid = document.getElementById('transaction-id').value;
            
            // Récupère les infos du VIP si elles sont dans l'URL
            const urlParams = new URLSearchParams(window.location.search);
            const vipPlan = urlParams.get('vip') || "Inconnu";
            const userId = urlParams.get('user_id') || "User_New";

            if (!amount || !txid) {
                alert("Veuillez remplir tous les champs avant de valider.");
                return;
            }

            // Prépare le signal pour Bots.Business / Telegram
            const depositData = {
                user: userId,
                montant: amount,
                plan: "VIP " + vipPlan,
                id_transaction: txid
            };

            // Notification à l'utilisateur
            alert("Demande de recharge soumise !\n\nL'administrateur vérifiera votre dépôt de " + amount + " USDT pour le Plan VIP " + vipPlan + ".");
            
            // Retour à l'accueil
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
