
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge USDT - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg-dark: #090b10; --card-bg: rgba(26, 29, 38, 0.9); --border: rgba(196, 255, 0, 0.2); --text-sec: #8a94ad; }
        body { background: radial-gradient(circle at top, #1a1d26, #090b10); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 24px; background: rgba(196, 255, 0, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid var(--border); }

        .address-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .qr-placeholder { background: white; width: 150px; height: 150px; margin: 15px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        
        .wallet-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; font-family: monospace; font-size: 13px; color: var(--primary); word-break: break-all; margin: 10px 0; border: 1px dashed var(--border); }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: white; box-sizing: border-box; outline: none; }

        .finish-btn { width: 100%; background: var(--primary); color: black; border: none; padding: 18px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; text-transform: uppercase; box-shadow: 0 10px 20px rgba(196, 255, 0, 0.2); }
        .finish-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"> < </a>
        <h2 style="margin:0; font-size: 20px;">Dépôt USDT</h2>
    </div>

    <div class="address-card">
        <div class="stat-label" style="font-size: 11px; color: var(--text-sec);">ADRESSE DE RECHARGE (BEP20)</div>
        <div class="wallet-box" id="wallet">0x9791D68C72B9197B0D36D619A0A89D3C6E5186E9</div>
        <button onclick="copyWallet()" style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 8px; font-size: 11px; cursor: pointer;">Copier l'adresse</button>
    </div>

    <div class="input-group">
        <label>Montant envoyé (USDT)</label>
        <input type="number" id="amount" placeholder="Ex: 50">
    </div>

    <div class="input-group">
        <label>ID de Transaction (Hash) ou Nom d'utilisateur</label>
        <input type="text" id="txid" placeholder="ID de la transaction">
    </div>

    <button class="finish-btn" onclick="submitDeposit()">J'ai déjà envoyé (Terminé)</button>

    <div style="text-align: center; font-size: 11px; color: var(--text-sec); margin-top: 15px;">
        ⚠️ Assurez-vous d'utiliser le réseau <b>BEP20</b> uniquement.
    </div>

    <script>
        function copyWallet() {
            const el = document.createElement('textarea');
            el.value = document.getElementById('wallet').innerText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Adresse copiée !");
        }

        function submitDeposit() {
            const amount = document.getElementById('amount').value;
            const txid = document.getElementById('txid').value;
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id') || "Inconnu";

            if (!amount || !txid) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            // Isit la nou prepare mesaj la pou voye nan Bot la
            const message = `🔔 *NOUVEAU DÉPÔT A VALIDER*\n\n` +
                          `👤 ID Utilisateur: ${userId}\n` +
                          `💰 Montant: ${amount} USDT\n` +
                          `📄 Preuve/TXID: ${txid}\n\n` +
                          `Cliquez sur le bouton ci-dessous pour valider.`;

            // Nou voye yon alert pou konfime epi retounen nan akèy la
            alert("Demande de recharge envoyée à l'administration !\nLe solde sera crédité après vérification.");
            
            // Redireksyon
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
