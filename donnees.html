
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minage Qeyko - 24h</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; --border: #242933; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; font-weight: bold; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; cursor: pointer; }

        .mining-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        
        /* Bar de progresyon */
        .progress-container { width: 100%; height: 6px; background: #1f242d; border-radius: 10px; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: 0.3s; }

        .label { color: #8a94ad; font-size: 14px; }
        .balance-value { font-size: 32px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .timer { font-family: monospace; color: #ffaa00; font-size: 18px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-label { font-size: 11px; color: #8a94ad; text-transform: uppercase; margin-bottom: 5px; }
        .stat-number { font-size: 15px; font-weight: bold; }

        .collect-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: black; 
            border: none; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        .collect-btn:disabled { background: #242933; color: #5c667a; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">‹</div>
        <span>Session de Minage (24h)</span>
    </div>

    <div class="mining-card">
        <div class="label">Revenu en cours de génération</div>
        <div class="balance-value" id="live-balance">0.000000</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        
        <div class="label">Temps restant : <span class="timer" id="countdown">24:00:00</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Puissance</div>
            <div class="stat-number">25.50 TH/s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Statut</div>
            <div class="stat-number" style="color: #00ff88;">Actif ●</div>
        </div>
    </div>

    <button class="collect-btn" id="btn-collect" onclick="collectToWallet()" disabled>
        Collecter le Revenu (1.00 USDT)
    </button>

    <script>
        const DURATION = 24 * 60 * 60; // 24 èdtan an segonn
        const TARGET_GAIN = 1.00; // 1 USDT pa jou
        
        let startTime = localStorage.getItem('mining_start_time');
        const collectBtn = document.getElementById('btn-collect');

        // Si se premye fwa, nou kòmanse revèy la
        if (!startTime) {
            startTime = Date.now();
            localStorage.setItem('mining_start_time', startTime);
        }

        function updateMining() {
            const now = Date.now();
            const elapsed = Math.floor((now - startTime) / 1000); // Segonn ki pase
            const remaining = DURATION - elapsed;

            if (remaining <= 0) {
                // 24 èdtan fini!
                document.getElementById('live-balance').innerText = "1.000000";
                document.getElementById('countdown').innerText = "00:00:00";
                document.getElementById('p-bar').style.width = "100%";
                collectBtn.disabled = false; // Bouton kolekte a vin aktive
                return;
            }

            // Kalkil kòb k ap moute a
            const currentGain = (elapsed / DURATION) * TARGET_GAIN;
            document.getElementById('live-balance').innerText = currentGain.toFixed(6);

            // Bar progresyon
            const percent = (elapsed / DURATION) * 100;
            document.getElementById('p-bar').style.width = percent + "%";

            // Revèy k ap desann
            const hrs = Math.floor(remaining / 3600);
            const mins = Math.floor((remaining % 3600) / 60);
            const secs = remaining % 60;
            document.getElementById('countdown').innerText = 
                `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function collectToWallet() {
            // Nou voye kòb la nan bous retrè a
            let mainBalance = parseFloat(localStorage.getItem('main_wallet_balance')) || 0;
            mainBalance += TARGET_GAIN;
            localStorage.setItem('main_wallet_balance', mainBalance);
            
            // Nou reset tout bagay pou yon lòt 24h
            localStorage.removeItem('mining_start_time');
            alert("✅ 1.00 USDT ajouté à votre solde de retrait !");
            window.location.reload();
        }

        // Mizajou chak segonn
        setInterval(updateMining, 1000);
        updateMining();
    </script>
</body>
</html>
