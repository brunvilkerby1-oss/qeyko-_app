<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données de Minage - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; --border: #242933; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; font-weight: bold; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; cursor: pointer; }

        /* Kat Balans lan */
        .mining-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }
        .label { color: #8a94ad; font-size: 14px; margin-bottom: 10px; }
        .balance-value { font-size: 32px; font-weight: bold; color: var(--primary); font-family: monospace; }
        .unit { font-size: 14px; color: #8a94ad; }

        /* Estatistik yo */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-label { font-size: 11px; color: #8a94ad; text-transform: uppercase; margin-bottom: 5px; }
        .stat-number { font-size: 16px; font-weight: bold; }

        /* Bouton Kolekte */
        .collect-btn { 
            width: 100%; padding: 18px; background: var(--primary); color: black; 
            border: none; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(196, 255, 0, 0.2);
        }
        .collect-btn:disabled { background: #242933; color: #5c667a; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">‹</div>
        <span>Données de Minage</span>
    </div>

    <div class="mining-card">
        <div class="label">Revenus de minage actuels</div>
        <div class="balance-value" id="live-balance">0.000000</div>
        <div class="unit">USDT</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Puissance</div>
            <div class="stat-number" id="mining-power">0.00 TH/s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Plan Actif</div>
            <div class="stat-number" id="current-plan">Aucun</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Gain Quotidien</div>
            <div class="stat-number" id="daily-gain">0.00 USDT</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Statut</div>
            <div class="stat-number" style="color: #00ff88;">En ligne ●</div>
        </div>
    </div>

    <button class="collect-btn" id="btn-collect" onclick="collectGains()" disabled>
        Collecter les Revenus
    </button>

    <script>
        // Done ki sove nan memwa a
        const vipLevel = localStorage.getItem('user_vip_level');
        let currentMining = parseFloat(localStorage.getItem('user_balance')) || 0.000000;
        
        const balanceDisplay = document.getElementById('live-balance');
        const powerDisplay = document.getElementById('mining-power');
        const planDisplay = document.getElementById('current-plan');
        const gainDisplay = document.getElementById('daily-gain');
        const collectBtn = document.getElementById('btn-collect');

        // Lojik si moun nan se VIP 1
        if (vipLevel === 'VIP 1') {
            // Mete enfòmasyon plan an
            powerDisplay.innerText = "25.50 TH/s";
            planDisplay.innerText = "VIP 1";
            gainDisplay.innerText = "1.00 USDT";
            collectBtn.disabled = false;

            // Kòmanse kontè a (1 USDT / 86400 segonn)
            setInterval(() => {
                currentMining += 0.00001157;
                balanceDisplay.innerText = currentMining.toFixed(6);
                localStorage.setItem('user_balance', currentMining);
            }, 1000);
        }

        // Fonksyon pou kolekte kòb la
        function collectGains() {
            if (currentMining > 0) {
                let mainWallet = parseFloat(localStorage.getItem('main_wallet_balance')) || 0.00;
                mainWallet += currentMining; // Transfere nan bous prensipal
                
                localStorage.setItem('main_wallet_balance', mainWallet);
                
                // Reyisyalize kontè minaj la
                currentMining = 0;
                localStorage.setItem('user_balance', 0);
                balanceDisplay.innerText = "0.000000";
                
                alert("✅ Succès ! Vos gains ont été transférés vers votre portefeuille principal.");
            }
        }
    </script>

</body>
</html>
