<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Données</title>
    <style>
        :root { --primary: #c4ff00; --bg: #12141a; --card: #1c1f29; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { font-size: 30px; text-decoration: none; color: white; margin-right: 20px; }
        .title { font-size: 20px; font-weight: bold; }
        .stats-box { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #2d3340; margin-bottom: 20px; text-align: center; }
        .label { color: #8a94ad; font-size: 13px; margin-bottom: 10px; }
        .val { font-size: 24px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span class="title">Données de Minage</span>
    </div>
    <div class="stats-box">
        <div class="label">REVENUS TOTAUX</div>
        <div class="val">0.00 USDT</div>
    </div>
    <div class="stats-box">
        <div class="label">ÉQUIPE ACTIVE</div>
        <div class="val">0 Membres</div>
    </div>
    <div style="text-align: center; color: #4e5a78; font-size: 12px; margin-top: 40px;">
        Aucune donnée historique trouvée.
    </div>
</body>
</html>
