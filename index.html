<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0a0e1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { margin-bottom: 30px; margin-top: 10px; }
        .card { background: linear-gradient(145deg, #161b2d, #0f1424); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 1px solid #232a45; }
        .balance-title { font-size: 14px; color: #8a94ad; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 38px; color: #00d2ff; font-weight: bold; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn { background: #161b2d; padding: 20px 10px; border-radius: 15px; text-decoration: none; color: white; font-size: 14px; border: 1px solid #232a45; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.95); background: #1c243d; }
        .btn-icon { font-size: 24px; margin-bottom: 8px; }
        .recharge { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border: none; font-weight: bold; box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4); }
        .footer { margin-top: 40px; color: #4e5a78; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color:#fff;">QEYKO MINING</h2>
        <p style="font-size:12px; color:#00d2ff;">Sistèm Mining Otomatik</p>
    </div>

    <div class="card">
        <div class="balance-title">Solde Total (USDT)</div>
        <div class="balance">0.0000</div>
    </div>

    <div class="grid">
        <div class="btn recharge"><span class="btn-icon">💰</span>Recharger</div>
        <div class="btn"><span class="btn-icon">💸</span>Retirer</div>
        <div class="btn"><span class="btn-icon">💎</span>Pack VIP</div>
        <div class="btn"><span class="btn-icon">🤝</span>Parrainage</div>
        <div class="btn"><span class="btn-icon">⚙️</span>Paramètres</div>
        <div class="btn"><span class="btn-icon">📊</span>Statistiques</div>
    </div>

    <div class="footer">
        © 2026 Qeyko Crypto Assets - Pwofite sekirite Blockchain
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand(); // Paj la ap louvri an gwo nèt
        tele.ready();
    </script>
</body>
</html>
