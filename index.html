
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <style>
        :root { 
            --primary: #c4ff00; 
            --bg-dark: #090b10; 
            --card-bg: rgba(26, 29, 38, 0.8); 
            --border: rgba(255, 255, 255, 0.1); 
            --text-sec: #8a94ad; 
        }

        body { 
            background: radial-gradient(circle at top right, #1a1d26, #090b10);
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* Effet d'entrée */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { animation: fadeIn 0.5s ease-out; }

        /* Carte Balance Premium */
        .balance-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            text-align: center; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-val { font-size: 36px; font-weight: 800; color: var(--primary); margin: 10px 0; letter-spacing: -1px; }
        .balance-label { color: var(--text-sec); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }

        /* Grille du Menu */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        
        .menu-btn { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 22px 10px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: white; 
            text-align: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px;
        }

        /* Effet Hover/Active */
        .menu-btn:active { transform: scale(0.92); border-color: var(--primary); background: rgba(196, 255, 0, 0.05); }
        
        .btn-icon-wrapper {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .usdt-logo { width: 30px; height: 30px; border-radius: 50%; }
        .btn-label { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }

        /* Pied de page */
        .footer-note { text-align: center; color: var(--text-sec); font-size: 11px; margin-top: 40px; padding-bottom: 20px; }
        .highlight { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="balance-label">Solde Total Disponible</div>
        <div class="balance-val">0.00 <span style="font-size: 18px;">USDT</span></div>
        <div style="font-size: 11px; color: var(--text-sec); background: rgba(0,0,0,0.2); display: inline-block; padding: 4px 12px; border-radius: 20px; margin-top: 10px;">
            Réseau : <span class="highlight">BEP20 (BSC)</span>
        </div>
    </div>

    <div class="menu-grid">
        
        <a href="recharger.html" class="menu-btn" style="border-color: rgba(196, 255, 0, 0.3);">
            <div class="btn-icon-wrapper">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=025" class="usdt-logo" alt="USDT">
            </div>
            <span class="btn-label" style="color: var(--primary);">Recharger</span>
        </a>

        <a href="retirer.html" class="menu-btn">
            <div class="btn-icon-wrapper">💸</div>
            <span class="btn-label">Retrait</span>
        </a>

        <a href="vip.html" class="menu-btn">
            <div class="btn-icon-wrapper">💎</div>
            <span class="btn-label">Packs VIP</span>
        </a>

        <a href="donnees.html" class="menu-btn">
            <div class="btn-icon-wrapper">📊</div>
            <span class="btn-label">Données</span>
        </a>

        <a href="parrainage.html" class="menu-btn">
            <div class="btn-icon-wrapper">👥</div>
            <span class="btn-label">Invitation</span>
        </a>

        <a href="parametres.html" class="menu-btn">
            <div class="btn-icon-wrapper">⚙️</div>
            <span class="btn-label">Paramètres</span>
        </a>

    </div>

    <div class="footer-note">
        © 2026 <span class="highlight">QEYKO CRYPTO ASSETS GLOBAL</span><br>
        SÉCURISÉ PAR LA BINANCE SMART CHAIN
    </div>

</body>
</html>
