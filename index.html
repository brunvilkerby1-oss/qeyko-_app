<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <style>
        body { background-color: #0a0e1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header { margin-bottom: 30px; }
        .card { background: linear-gradient(145deg, #161b2d, #0f1424); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid #232a45; }
        .balance { font-size: 38px; color: #00d2ff; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn { background: #161b2d; padding: 20px 10px; border-radius: 15px; text-decoration: none; color: white; font-size: 14px; border: 1px solid #232a45; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .recharge { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border: none; font-weight: bold; }
        .btn-icon { font-size: 24px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>QEYKO MINING</h2>
        <p style="font-size:12px; color:#00d2ff;">Sistèm Mining Otomatik</p>
    </div>

    <div class="card">
        <div style="font-size: 14px; color: #8a94ad;">Solde Total (USDT)</div>
        <div class="balance">0.0000</div>
    </div>

    <div class="grid">
        <a href="recharger.html" class="btn recharge"><span class="btn-icon">💰</span>Recharger</a>
        <a href="retirer.html" class="btn"><span class="btn-icon">💸</span>Retirer</a>
        <a href="vip.html" class="btn"><span class="btn-icon">💎</span>Pack VIP</a>
        <a href="parrainage.html" class="btn"><span class="btn-icon">🤝</span>Parrainage</a>
        <a href="parametres.html" class="btn"><span class="btn-icon">⚙️</span>Paramètres</a>
        <a href="statistiques.html" class="btn"><span class="btn-icon">📊</span>Statistiques</a>
    </div>
</body>
</html>
