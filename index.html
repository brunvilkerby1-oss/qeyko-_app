<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <style>
        :root { 
            --primary: #c4ff00; 
            --bg-dark: #090b10; 
            --card-bg: rgba(26, 29, 38, 0.9); 
            --border: rgba(255, 255, 255, 0.1); 
            --text-sec: #8a94ad; 
        }

        body { 
            background: radial-gradient(circle at top, #1a1d26, #090b10);
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
            min-height: 100vh;
        }

        .balance-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            text-align: center; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-val { font-size: 34px; font-weight: 800; color: var(--primary); margin: 8px 0; }
        .balance-label { color: var(--text-sec); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .menu-btn { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 20px 10px; 
            border-radius: 20px; 
            text-decoration: none; 
            color: white; 
            text-align: center; 
            transition: 0.2s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px;
        }

        .menu-btn:active { transform: scale(0.95); border-color: var(--primary); background: rgba(196, 255, 0, 0.05); }
        
        .icon-wrapper {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-label { font-size: 13px; font-weight: 600; }
        .footer-note { text-align: center; color: var(--text-sec); font-size: 10px; margin-top: 40px; line-height: 1.6; }
        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="balance-label">Solde Total USDT</div>
        <div class="balance-val" id="user-balance-display">0.000000</div>
        <div style="font-size: 11px; color: var(--text-sec);">Réseau sécurisé : <span class="highlight">BEP20</span></div>
    </div>

    <div class="menu-grid">
        <a href="recharger.html" class="menu-btn" style="border-color: rgba(196, 255, 0, 0.4);">
            <div class="icon-wrapper">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" fill="#26A17B"/>
                    <path d="M12.72 8.36h3.09V6.18H8.18v2.18h3.09v5.46h1.45V8.36zM15.82 10.55H8.18v1.09c0 1.45 1.71 2.6 3.82 2.6s3.82-1.15 3.82-2.6v-1.09z" fill="white"/>
                </svg>
            </div>
            <span class="btn-label" style="color: var(--primary);">Recharger</span>
        </a>

        <a href="retirer.html" class="menu-btn">
            <div class="icon-wrapper" style="font-size: 24px;">💸</div>
            <span class="btn-label">Retrait</span>
        </a>

        <a href="vip.html" class="menu-btn">
            <div class="icon-wrapper" style="font-size: 24px;">💎</div>
            <span class="btn-label">Packs VIP</span>
        </a>

        <a href="donnees.html" class="menu-btn">
            <div class="icon-wrapper" style="font-size: 24px;">📊</div>
            <span class="btn-label">Données</span>
        </a>

        <a href="parrainage.html" class="menu-btn">
            <div class="icon-wrapper" style="font-size: 24px;">👥</div>
            <span class="btn-label">Invitation</span>
        </a>

        <a href="parametres.html" class="menu-btn">
            <div class="icon-wrapper" style="font-size: 24px;">⚙️</div>
            <span class="btn-label">Paramètres</span>
        </a>
    </div>

    <div class="footer-note">
        © 2026 <span class="highlight">QEYKO CRYPTO ASSETS GLOBAL</span><br>
        SÉCURISÉ PAR LA BINANCE SMART CHAIN (BSC)
    </div>

    <script>
        async function runMining() {
            let display = document.getElementById('user-balance-display');
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');

            // 1. Nou montre balans lokal la an premye
            let solde = parseFloat(localStorage.getItem('user_balance')) || 0.000000;
            display.innerText = solde.toFixed(6);

            // 2. Si nou gen ID a, nou al chèche balans fre ak yon Proxy
            if (userId) {
                // Proxy sa ap debloke sekirite Bots.Business la pou GitHub
                const proxyUrl = "https://api.allorigins.win/get?url=";
                const targetUrl = encodeURIComponent(`https://api.bots.business/v1/bots/qeykominingbot/web-app/get_balance?user_id=${userId}`);

                try {
                    let response = await fetch(proxyUrl + targetUrl);
                    let result = await response.json();
                    
                    // Dekode repons lan ki soti nan Proxy a
                    let data = JSON.parse(result.contents);
                    
                    if (data.balance !== undefined) {
                        solde = parseFloat(data.balance);
                        localStorage.setItem('user_balance', solde);
                        display.innerText = solde.toFixed(6);
                    }
                } catch (e) {
                    console.log("Erreur de synchronisation Proxy");
                }
            }

            // 3. Lojik Mining vizyèl si gen yon VIP aktif
            let activeVip = localStorage.getItem('active_vip');
            if (activeVip) {
                const profits = {
                    'VIP 1': 1.00, 'VIP 2': 1.80, 'VIP 3': 3.00, 
                    'VIP 4': 4.00, 'VIP 5': 10.00, 'VIP 6': 15.00, 'VIP 7': 25.00
                };
                let pwofiPaJou = profits[activeVip] || 0;
                let pwofiPaSegonn = pwofiPaJou / 86400;

                setInterval(() => {
                    solde += pwofiPaSegonn;
                    display.innerText = solde.toFixed(6);
                    localStorage.setItem('user_balance', solde);
                }, 1000);
            }
        }

        window.onload = runMining;
    </script>
</body>
</html>
