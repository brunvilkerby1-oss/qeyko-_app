
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining - Dashboard</title>
    <style>
        :root {
            --primary: #c4ff00;
            --bg-dark: #0f1117;
            --card-bg: #1a1d26;
            --border: #2d3340;
            --text-secondary: #8a94ad;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 25px; width: 100%; }
        .logo-text { font-size: 22px; font-weight: 900; letter-spacing: 4px; color: #fff; }
        .status-badge { 
            background: rgba(196, 255, 0, 0.1); 
            color: var(--primary); 
            font-size: 10px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(196, 255, 0, 0.2);
            margin-top: 8px;
            display: inline-block;
        }

        .balance-card { 
            background: var(--card-bg); 
            border-radius: 25px; 
            padding: 35px 20px; 
            width: 100%;
            max-width: 350px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }
        .bal-title { color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
        .bal-amount { font-size: 36px; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .bal-sub { font-size: 13px; color: var(--text-secondary); }

        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%;
            max-width: 350px;
        }

        /* Stil bouton yo lè yo peze */
        .menu-btn { 
            background: var(--card-bg); 
            border-radius: 22px; 
            padding: 25px 10px; 
            text-decoration: none; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .menu-btn:active { 
            transform: scale(0.92); 
            background: #242936; 
            border-color: var(--primary);
        }

        .btn-highlight { 
            background: var(--primary); 
            border: none;
        }
        .btn-highlight span { color: #000 !important; font-weight: 800 !important; }

        .btn-icon { font-size: 30px; margin-bottom: 12px; }
        .btn-label { font-size: 13px; font-weight: 600; }

        .footer-note { 
            margin-top: 50px; 
            text-align: center; 
            font-size: 10px; 
            color: #4e5a78; 
            letter-spacing: 0.5px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">QEYKO MINING</div>
        <div class="status-badge">● SYSTÈME DE MINAGE ACTIF</div>
    </div>

    <div class="balance-card">
        <div class="bal-title">Actifs Totaux (USDT)</div>
        <div class="bal-amount">0.000000</div>
        <div class="bal-sub">Profit aujourd'hui: <span style="color:var(--primary)">+0.00 USDT</span></div>
    </div>

    <div class="menu-grid">
        <a href="recharger.html" class="menu-btn btn-highlight">
            <span class="btn-icon">📥</span>
            <span class="btn-label">Recharger</span>
        </a>

        <a href="retirer.html" class="menu-btn">
            <span class="btn-icon">📤</span>
            <span class="btn-label">Retirer</span>
        </a>

        <a href="vip.html" class="menu-btn">
            <span class="btn-icon">💎</span>
            <span class="btn-label">Packs VIP</span>
        </a>

        <a href="parrainage.html" class="menu-btn">
            <span class="btn-icon">👥</span>
            <span class="btn-label">Invitation</span>
        </a>

        <a href="parametres.html" class="menu-btn">
            <span class="btn-icon">⚙️</span>
            <span class="btn-label">Paramètres</span>
        </a>

        <a href="donnee.html" class="menu-btn">
            <span class="btn-icon">📊</span>
            <span class="btn-label">Données</span>
        </a>
    </div>

    <div class="footer-note">
        © 2026 QEYKO CRYPTO ASSETS GLOBAL<br>
        SÉCURISÉ PAR LA BINANCE SMART CHAIN (BEP20)
    </div>

</body>
</html>
