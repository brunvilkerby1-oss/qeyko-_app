<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining - Accueil</title>
    <style>
        :root {
            --primary: #c4ff00; /* Vèt fliyoresan */
            --bg-dark: #12141a;
            --card-bg: #1c1f29;
            --border: #2d3340;
            --text-gray: #8a94ad;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .logo-title { 
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: 3px; 
            color: #fff;
            text-shadow: 0 0 10px rgba(196, 255, 0, 0.3);
        }
        .status-bar { 
            display: inline-block;
            background: rgba(196, 255, 0, 0.1);
            color: var(--primary); 
            font-size: 10px; 
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 8px;
            font-weight: bold;
            border: 1px solid rgba(196, 255, 0, 0.2);
        }

        /* Kat Balans lan ak "Neon Effect" */
        .balance-card { 
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 30px 20px; 
            margin-bottom: 30px; 
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 0 20px rgba(196, 255, 0, 0.05);
        }
        .bal-label { color: var(--text-gray); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .bal-value { font-size: 38px; font-weight: 800; color: var(--primary); margin: 12px 0; }
        .daily-profit { font-size: 13px; color: var(--text-gray); }
        .daily-profit span { color: var(--primary); font-weight: bold; }

        /* Grid bouton yo */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        .menu-item { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 25px 15px; 
            text-decoration: none; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .menu-item:active { transform: scale(0.92); border-color: var(--primary); }

        /* Bouton Recharger a ki gen bèl koulè fliyoresan */
        .recharger-btn { 
            background: linear-gradient(145deg, #c4ff00, #a8db00); 
            border: none;
            box-shadow: 0 5px 15px rgba(196, 255, 0, 0.3);
        }
        .recharger-btn .label, .recharger-btn .icon { color: #000 !important; }

        .icon { font-size: 28px; margin-bottom: 12px; }
        .label { font-size: 14px; font-weight: 700; color: #fff; }

        .footer { 
            margin-top: 50px; 
            text-align: center; 
            font-size: 11px; 
            color: var(--text-gray); 
            line-height: 1.6;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-title">QEYKO MINING</div>
        <div class="status-bar">● SYSTÈME DE MINAGE ACTIF</div>
    </div>

    <div class="balance-card">
        <div class="bal-label">Actifs Totaux (USDT)</div>
        <div class="bal-value">0.000000</div>
        <div class="daily-profit">Profit d'aujourd'hui: <span>+0.00 USDT</span></div>
    </div>

    <div class="menu-grid">
        <a href="recharger.html" class="menu-item recharger-btn">
            <span class="icon">📥</span>
            <span class="label">Recharger</span>
        </a>

        <a href="retirer.html" class="menu-item">
            <span class="icon">📤</span>
            <span class="label">Retirer</span>
        </a>

        <a href="vip.html" class="menu-item">
            <span class="icon">💎</span>
            <span class="label">Packs VIP</span>
        </a>

        <a href="parrainage.html" class="menu-item">
            <span class="icon">👥</span>
            <span class="label">Invitation</span>
        </a>

        <a href="parametres.html" class="menu-item">
            <span class="icon">⚙️</span>
            <span class="label">Paramètres</span>
        </a>

        <a href="statistiques.html" class="menu-item">
            <span class="icon">📊</span>
            <span class="label">Données</span>
        </a>
    </div>

    <div class="footer">
        © 2026 QEYKO CRYPTO ASSETS GLOBAL<br>
        SÉCURISÉ PAR LA BINANCE SMART CHAIN (BEP20)
    </div>

</body>
</html>
