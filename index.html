
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining</title>
    <style>
        :root { --primary: #c4ff00; --bg: #12141a; --card: #1c1f29; --border: #2d3340; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .status { color: var(--primary); font-size: 10px; background: rgba(196,255,0,0.1); padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; font-weight: bold; }

        .balance-card { background: var(--card); border-radius: 24px; padding: 30px; text-align: center; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bal-val { font-size: 38px; font-weight: bold; color: var(--primary); margin: 12px 0; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: var(--card); border-radius: 20px; padding: 25px 10px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; border: 1px solid var(--border); transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--primary); }
        
        .recharger-btn { background: var(--primary); border: none; }
        .recharger-btn .label, .recharger-btn .icon { color: black !important; }

        .icon { font-size: 28px; margin-bottom: 12px; }
        .label { font-size: 14px; font-weight: bold; }
        .footer { text-align: center; font-size: 11px; color: #4e5a78; margin-top: 40px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">QEYKO MINING</div>
        <div class="status">● SYSTÈME DE MINAGE ACTIF</div>
    </div>

    <div class="balance-card">
        <div style="color:#8a94ad; font-size:12px; text-transform: uppercase;">Actifs Totaux (USDT)</div>
        <div class="bal-val">0.000000</div>
        <div style="font-size:12px; color:#8a94ad;">Profit d'aujourd'hui: <span style="color:var(--primary)">+0.00 USDT</span></div>
    </div>

    <div class="menu-grid">
        <a href="recharger.html" class="menu-item recharger-btn">
            <span class="icon">📥</span><span class="label">Recharger</span>
        </a>
        <a href="retirer.html" class="menu-item">
            <span class="icon">📤</span><span class="label">Retirer</span>
        </a>
        <a href="vip.html" class="menu-item">
            <span class="icon">💎</span><span class="label">Packs VIP</span>
        </a>
        <a href="parrainage.html" class="menu-item">
            <span class="icon">👥</span><span class="label">Invitation</span>
        </a>
        <a href="parametres.html" class="menu-item">
            <span class="icon">⚙️</span><span class="label">Paramètres</span>
        </a>
        <a href="statistiques.html" class="menu-item">
            <span class="icon">📊</span><span class="label">Données</span>
        </a>
    </div>

    <div class="footer">
        © 2026 QEYKO CRYPTO ASSETS GLOBAL<br>
        SÉCURISÉ PAR LA BINANCE SMART CHAIN (BEP20)
    </div>
</body>
</html>
