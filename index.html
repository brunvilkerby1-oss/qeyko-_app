<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Crypto Mining</title>
    <style>
        :root { --primary: #c4ff00; --bg-dark: #090b10; --card-bg: rgba(26, 29, 38, 0.9); --border: rgba(255, 255, 255, 0.1); --text-sec: #8a94ad; }
        body { background: radial-gradient(circle at top, #1a1d26, #090b10); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        .balance-card { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; margin-bottom: 25px; }
        .balance-val { font-size: 34px; font-weight: 800; color: var(--primary); margin: 8px 0; }
        .balance-label { color: var(--text-sec); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 20px 10px; border-radius: 20px; text-decoration: none; color: white; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .icon-wrapper { width: 44px; height: 44px; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .btn-label { font-size: 13px; font-weight: 600; }
        .highlight { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="balance-card">
        <div class="balance-label">Solde Total USDT</div>
        <div class="balance-val" id="user-balance-display">Lancement...</div>
        <div style="font-size: 11px; color: var(--text-sec);">Réseau sécurisé : <span class="highlight">BEP20</span></div>
    </div>

    <div class="menu-grid">
        <a href="recharger.html" class="menu-btn" style="border-color: rgba(196, 255, 0, 0.4);">
            <div class="icon-wrapper">💰</div>
            <span class="btn-label" style="color: var(--primary);">Recharger</span>
        </a>
        <a href="retirer.html" class="menu-btn"><div class="icon-wrapper">💸</div><span class="btn-label">Retrait</span></a>
        <a href="vip.html" class="menu-btn"><div class="icon-wrapper">💎</div><span class="btn-label">Packs VIP</span></a>
        <a href="donnees.html" class="menu-btn"><div class="icon-wrapper">📊</div><span class="btn-label">Données</span></a>
        <a href="parrainage.html" class="menu-btn"><div class="icon-wrapper">👥</div><span class="btn-label">Invitation</span></a>
        <a href="parametres.html" class="menu-btn"><div class="icon-wrapper">⚙️</div><span class="btn-label">Paramètres</span></a>
    </div>

    <script>
        async function runMining() {
            const display = document.getElementById('user-balance-display');
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');

            if (!userId) {
                display.innerText = "ID Manquant";
                return;
            }

            // Nou itilize AllOrigins pou debloke sekirite a
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent(`https://api.bots.business/v1/bots/qeykominingbot/web-app/get_balance?user_id=${userId}&t=${Date.now()}`);

            try {
                const response = await fetch(proxy + target);
                const result = await response.json();
                const data = JSON.parse(result.contents);
                
                if (data.balance !== undefined) {
                    let solde = parseFloat(data.balance);
                    display.innerText = solde.toFixed(6);
                    
                    // Lojik mining vizyèl
                    let activeVip = localStorage.getItem('active_vip');
                    if (activeVip) {
                        const profits = {'VIP 1': 1.0, 'VIP 2': 1.8, 'VIP 3': 3.0, 'VIP 4': 4.0, 'VIP 5': 10.0, 'VIP 6': 15.0, 'VIP 7': 25.0};
                        let pwofiPaSegonn = (profits[activeVip] || 0) / 86400;
                        setInterval(() => {
                            solde += pwofiPaSegonn;
                            display.innerText = solde.toFixed(6);
                        }, 1000);
                    }
                } else {
                    display.innerText = "0.000000";
                }
            } catch (e) {
                display.innerText = "Erreur Sync";
            }
        }
        window.onload = runMining;
    </script>
</body>
</html>
