<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 25px; font-weight: bold; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; }
        
        .notif-item { 
            background: var(--card); 
            border-left: 4px solid var(--primary); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: none; /* Cache par défaut */
        }
        .notif-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: var(--primary); }
        .notif-msg { font-size: 13px; color: #d1d5db; line-height: 1.4; }
        .notif-time { font-size: 10px; color: #8a94ad; margin-top: 8px; text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <a href="parametres.html" class="back-btn">‹</a>
        <span>Notifications</span>
    </div>

    <div id="notif-container">
        <div id="msg-pending" class="notif-item" style="border-left-color: #ffaa00;">
            <div class="notif-title">⏳ Vérification en cours...</div>
            <div class="notif-msg">Le système scanne la blockchain pour confirmer votre dépôt. Veuillez patienter 1 minute.</div>
            <div class="notif-time">Maintenant</div>
        </div>

        <div id="msg-success" class="notif-item">
            <div class="notif-title">✅ Dépôt Réussi & Plan Activé</div>
            <div class="notif-msg">Votre dépôt a été confirmé avec succès. Votre Pack VIP est désormais actif et génère des revenus.</div>
            <div class="notif-time">À l'instant</div>
        </div>
    </div>

    <script>
        const status = localStorage.getItem('notif_status');
        const pending = document.getElementById('msg-pending');
        const success = document.getElementById('msg-success');

        if (status === 'pending') {
            pending.style.display = 'block';
            
            // Simule l'activation automatique après 6 secondes
            setTimeout(() => {
                pending.style.display = 'none';
                success.style.display = 'block';
                localStorage.setItem('notif_status', 'active');
            }, 6000);
        } else if (status === 'active') {
            success.style.display = 'block';
        }
    </script>
</body>
</html>
