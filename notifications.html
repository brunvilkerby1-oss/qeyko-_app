<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0b0d12; --card: #161a23; --border: #242933; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 25px; font-weight: bold; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; }

        .notif-container { display: flex; flex-direction: column; gap: 15px; }
        
        .notif-item { 
            background: var(--card); 
            border-left: 4px solid var(--primary); 
            padding: 18px; 
            border-radius: 15px; 
            border-top: 1px solid var(--border);
            display: none; /* Cache par défaut */
        }
        .notif-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; color: var(--primary); }
        .notif-msg { font-size: 13px; color: #d1d5db; line-height: 1.5; }
        .notif-time { font-size: 10px; color: #5c667a; margin-top: 10px; text-align: right; }

        .empty-state { text-align: center; margin-top: 60px; color: #5c667a; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="parametres.html" class="back-btn">‹</a>
        <span>Notifications</span>
    </div>

    <div id="notif-list" class="notif-container">
        <div id="msg-pending" class="notif-item" style="border-left-color: #ffaa00;">
            <div class="notif-title">⏳ Vérification du dépôt...</div>
            <div class="notif-msg">Le système scanne le réseau BEP20 pour confirmer votre transfert. Veuillez ne pas fermer cette page.</div>
            <div class="notif-time">Maintenant</div>
        </div>
