
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres</title>
    <style>
        :root { --primary: #c4ff00; --bg: #12141a; --card: #1c1f29; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { font-size: 30px; text-decoration: none; color: white; margin-right: 20px; }
        .title { font-size: 20px; font-weight: bold; }
        .list { background: var(--card); border-radius: 20px; border: 1px solid #2d3340; overflow: hidden; }
        .item { padding: 20px; border-bottom: 1px solid #2d3340; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; }
        .item:last-child { border-bottom: none; }
        .item span { font-size: 15px; }
        .logout { margin-top: 40px; width: 100%; padding: 18px; border-radius: 35px; border: 1px solid #ff3e3e; background: rgba(255,62,62,0.1); color: #ff3e3e; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span class="title">Paramètres</span>
    </div>
    <div class="list">
        <div class="item"><span>👤 Profil Utilisateur</span><span>›</span></div>
        <div class="item"><span>🔒 Sécurité du Compte</span><span>›</span></div>
        <div class="item"><span>🌐 Langue</span><span style="color:var(--primary)">Français</span></div>
        <div class="item"><span>🔔 Notifications</span><span>›</span></div>
    </div>
    <button class="logout" onclick="location.href='index.html'">Se déconnecter</button>
</body>
</html>
