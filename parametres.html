
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeyko Mining - Paramètres</title>
    <style>
        :root {
            --primary: #c4ff00;
            --bg-dark: #0f1117;
            --card-bg: #1a1d26;
            --border: #2d3340;
            --text-secondary: #8a94ad;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        /* Header ak flèch tounen */
        .header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-top: 10px;
        }
        .back-btn { 
            font-size: 28px; 
            text-decoration: none; 
            color: white; 
            margin-right: 15px;
            display: flex;
            align-items: center;
        }
        .title { font-size: 20px; font-weight: bold; }

        /* Veso pou lis opsyon yo */
        .settings-list { 
            background: var(--card-bg); 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            margin-bottom: 30px;
        }

        /* Stil pou chak liy (bouton) */
        .setting-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            text-decoration: none; 
            color: white; 
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }

        .setting-item:last-child { border-bottom: none; }

        /* Efè lè ou peze liy lan */
        .setting-item:active { 
            background: #242936; 
        }

        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-icon { font-size: 20px; width: 25px; text-align: center; }
        .item-label { font-size: 15px; font-weight: 500; }
        
        .arrow-right { color: var(--text-secondary); font-size: 12px; }
        .lang-status { color: var(--primary); font-size: 14px; font-weight: bold; }

        /* Bouton Dekonekte */
        .logout-btn { 
            width: 100%; 
            padding: 18px; 
            border-radius: 35px; 
            border: 1px solid #ff3e3e; 
            background: rgba(255, 62, 62, 0.05); 
            color: #ff3e3e; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
        }

        .logout-btn:active { 
            transform: scale(0.96); 
            background: rgba(255, 62, 62, 0.15); 
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span class="title">Paramètres</span>
    </div>

    <div class="settings-list">
        <a href="profil.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">👤</span>
                <span class="item-label">Profil Utilisateur</span>
            </div>
            <span class="arrow-right">›</span>
        </a>

        <a href="securite.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">🔒</span>
                <span class="item-label">Sécurité du Compte</span>
            </div>
            <span class="arrow-right">›</span>
        </a>

        <a href="langue.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">🌐</span>
                <span class="item-label">Langue</span>
            </div>
            <span class="lang-status">Français</span>
        </a>

        <a href="notifications.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">🔔</span>
                <span class="item-label">Notifications</span>
            </div>
            <span class="arrow-right">›</span>
        </a>
    </div>

    <button class="logout-btn" onclick="window.location.href='index.html'">
        Se déconnecter
    </button>

</body>
</html>
