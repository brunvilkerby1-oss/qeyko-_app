<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #161a23; --border: #242933; --red: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        
        .header { display: flex; align-items: center; margin-bottom: 30px; font-weight: bold; }
        .back-btn { font-size: 24px; text-decoration: none; color: white; margin-right: 15px; cursor: pointer; }

        .settings-list { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        
        .setting-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            color: white;
            text-decoration: none;
        }
        .setting-item:last-child { border-bottom: none; }

        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-icon { font-size: 20px; }
        .item-label { font-size: 15px; }
        .lang-status { font-size: 14px; color: var(--primary); font-weight: bold; }
        .arrow-right { color: #5c667a; font-size: 18px; }

        .logout-btn { 
            width: 100%; margin-top: 30px; padding: 18px; background: transparent; 
            color: var(--red); border: 1px solid var(--red); border-radius: 50px; 
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">‹</div>
        <span>Paramètres</span>
    </div>

    <div class="settings-list">
        <a href="profil.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">👤</span>
                <span class="item-label">Profil Utilisateur</span>
            </div>
            <span class="arrow-right">›</span>
        </a>

        <div class="setting-item" onclick="window.location.assign('securite.html')">
            <div class="item-info">
                <span class="item-icon">🔒</span>
                <span class="item-label">Sécurité du Compte</span>
            </div>
            <span class="arrow-right">›</span>
        </div>

        <div class="setting-item">
            <div class="item-info">
                <span class="item-icon">🌐</span>
                <span class="item-label">Langue</span>
            </div>
            <span class="lang-status">Français</span>
        </div>

        <a href="notifications.html" class="setting-item">
            <div class="item-info">
                <span class="item-icon">🔔</span>
                <span class="item-label">Notifications</span>
            </div>
            <span class="arrow-right">›</span>
        </a>
    </div>

    <button class="logout-btn" onclick="logoutUser()">Se déconnecter</button>

    <script>
        function logoutUser() {
            if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>

</body>
</html>
