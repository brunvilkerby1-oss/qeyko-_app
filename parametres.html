
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres</title>
    <style>
        :root { --primary: #c4ff00; --bg: #0f1117; --card: #1a1d26; --border: #2d3340; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { font-size: 30px; text-decoration: none; color: white; margin-right: 20px; }
        .title { font-size: 20px; font-weight: bold; }
        
        .list { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        
        /* Stil pou bouton yo ka peze */
        .item { 
            padding: 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            text-decoration: none; 
            color: white; 
            transition: 0.2s;
        }
        .item:active { background: #242936; }
        .item:last-child { border-bottom: none; }
        
        .logout { 
            margin-top: 40px; width: 100%; padding: 18px; border-radius: 35px; 
            border: 1px solid #ff3e3e; background: rgba(255,62,62,0.1); 
            color: #ff3e3e; font-weight: bold; font-size: 16px; cursor: pointer; 
        }
        .logout:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">‹</a>
        <span class="title">Paramètres</span>
    </div>
    <div class="list">
        <a href="#" class="item"><span>👤 Profil Utilisateur</span><span>›</span></a>
        <a href="#" class="item"><span>🔒 Sécurité du Compte</span><span>›</span></a>
        <a href="#" class="item"><span>🌐 Langue</span><span style="color:var(--primary)">Français</span></a>
        <a href="#" class="item"><span>🔔 Notifications</span><span>›</span></a>
    </div>
    <button class="logout" onclick="location.href='index.html'">Se déconnecter</button>
</body>
</html>
