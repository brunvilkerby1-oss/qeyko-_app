<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrait USDT - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg-dark: #090b10; --card-bg: rgba(26, 29, 38, 0.9); --border: rgba(196, 255, 0, 0.2); --text-sec: #8a94ad; }
        body { background: radial-gradient(circle at top, #1a1d26, #090b10); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        
        /* Header avec bouton retour */
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 24px; background: rgba(196, 255, 0, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid var(--border); transition: 0.3s; }
        .back-btn:active { transform: scale(0.9); }

        /* Carte de Balance */
        .balance-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); position: relative; }
        .usdt-badge { background: #26a17b; color: white; font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 50px; position: absolute; top: 15px; right: 15px; }
        .logo-container { margin-bottom: 15px; }
        .logo-container img { width: 60px; height: 60px; filter: drop-shadow(0 0 10px rgba(38, 161, 123, 0.3)); }
        .balance-value { font-size: 36px; font-weight: 800; color: var(--primary); margin: 5px 0; font-variant-numeric: tabular-nums; }
        
        /* Formulaire */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.2px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 18px; color: white; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(196, 255, 0, 0.05); }

        /* Bouton Retrait */
        .withdraw-btn { width: 100%; border: none; padding: 22px; border-radius: 22px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-ready { background: var(--primary); color: black; box-shadow: 0 10px 25px rgba(196, 255, 0, 0.3); }
        .btn-locked { background: #151821; color: #444; cursor: not-allowed; border: 1px solid #222; }

        .footer-note { text-align: center; font-size: 11px; color: var(--text-sec); margin-top: 20px; line-height: 1.6; }
        .network-tag { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"> < </a>
        <h2 style="margin:0; font-size: 20px;">Retrait de Fonds</h2>
    </div>

    <div class="balance-card">
        <div class="usdt-badge">BEP20</div>
        <div class="logo-container">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT Logo">
        </div>
        <span class="stat-label" style="font-size: 12px; color: var(--text-sec); text-transform: uppercase;">Solde Retirable</span>
        <div class="balance-value" id="display-balance">0.000000</div>
    </div>

    <div class="input-group">
        <label>Adresse de Réception (USDT BEP20)</label>
        <input type="text" id="wallet-addr" placeholder="0x..." oninput="checkValidation()">
    </div>

    <div class="input-group">
        <label>Montant du Retrait (Min. 1.00)</label>
        <input type="number" id="amount" placeholder="0.00" oninput="checkValidation()">
    </div>

    <button id="withdraw-btn" class="withdraw-btn btn-locked" disabled onclick="processWithdrawal()">
        Solde Insuffisant
    </button>

    <div class="footer-note">
        Le retrait minimum est de **1.00 USDT**.<br>
        Assurez-vous que l'adresse est sur le réseau <span class="network-tag">BNB Smart Chain (BEP20)</span>.
    </div>

    <script>
        // Simulation du solde (À connecter avec ton API Bots.Business plus tard)
        let currentBalance = 110.00; 

        function init() {
            document.getElementById('display-balance').innerText = currentBalance.toFixed(6);
            checkValidation();
        }

        function checkValidation() {
            const amountInput = document.getElementById('amount').value;
            const addrInput = document.getElementById('wallet-addr').value;
            const btn = document.getElementById('withdraw-btn');
            const amount = parseFloat(amountInput);

            // Règle : Minimum 1.00 USDT et adresse valide (longueur > 10)
            if (amount >= 1.00 && amount <= currentBalance && addrInput.length > 20) {
                btn.className = "withdraw-btn btn-ready";
                btn.disabled = false;
                btn.innerText = "Confirmer le Retrait";
            } else {
                btn.className = "withdraw-btn btn-locked";
                btn.disabled = true;
                
                if (amountInput === "" || amountInput <= 0) {
                    btn.innerText = "Entrez un montant";
                } else if (amount < 1.00) {
                    btn.innerText = "Minimum 1.00 USDT";
                } else if (amount > currentBalance) {
                    btn.innerText = "Solde Insuffisant";
                } else {
                    btn.innerText = "Adresse Invalide";
                }
            }
        }

        function processWithdrawal() {
            const amount = document.getElementById('amount').value;
            const addr = document.getElementById('wallet-addr').value;

            alert(`Demande de retrait soumise !\n\nMontant : ${amount} USDT\nAdresse : ${addr}\n\nStatut : En attente de validation (24h).`);
            
            // Retourner à l'accueil
            window.location.href = "index.html";
        }

        window.onload = init;
    </script>
</body>
</html>
