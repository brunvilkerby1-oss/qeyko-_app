

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrait USDT - Qeyko</title>
    <style>
        :root { --primary: #c4ff00; --bg-dark: #090b10; --card-bg: rgba(26, 29, 38, 0.9); --border: rgba(196, 255, 0, 0.2); --text-sec: #8a94ad; }
        body { background: radial-gradient(circle at top, #1a1d26, #090b10); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 24px; background: rgba(196, 255, 0, 0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 1px solid var(--border); }

        .balance-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .usdt-logo { width: 50px; height: 50px; margin-bottom: 10px; }
        .balance-amount { font-size: 30px; font-weight: 800; color: var(--primary); margin: 10px 0; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px; border-radius: 18px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); background: rgba(196, 255, 0, 0.05); }

        .withdraw-btn { width: 100%; border: none; padding: 20px; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-ready { background: var(--primary); color: black; box-shadow: 0 10px 20px rgba(196, 255, 0, 0.2); }
        .btn-disabled { background: #1a1d26; color: #444; cursor: not-allowed; border: 1px solid #333; }

        .notice { font-size: 11px; color: var(--text-sec); text-align: center; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"> < </a>
        <h2 style="margin:0; font-size: 20px;">Retrait de Fonds</h2>
    </div>

    <div class="balance-card">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="usdt-logo" alt="USDT">
        <div class="stat-label" style="font-size: 12px; color: var(--text-sec);">SOLDE DISPONIBLE</div>
        <div class="balance-amount" id="current-balance">0.000000</div>
        <span style="font-size: 10px; color: #00ff88;">Réseau : BEP20 (BSC)</span>
    </div>

    <div class="input-group">
        <label>Adresse de Portefeuille USDT</label>
        <input type="text" id="wallet-address" placeholder="Entrez votre adresse BEP20">
    </div>

    <div class="input-group">
        <label>Montant à retirer (Min. 1.00)</label>
        <input type="number" id="withdraw-amount" placeholder="0.00" oninput="validateWithdraw()">
    </div>

    <button id="withdraw-btn" class="withdraw-btn btn-disabled" disabled onclick="sendWithdrawRequest()">
        Solde Insuffisant
    </button>

    <div class="notice">
        Les retraits sont vérifiés manuellement par l'administration.<br>
        Délai de traitement : 1 à 24 heures.
    </div>

    <script>
        // Similasyon balans (isit la nou ka konekte ak API bot la)
        let userBalance = 110.00; // Valè tès ou a

        function init() {
            document.getElementById('current-balance').innerText = userBalance.toFixed(6);
            validateWithdraw();
        }

        function validateWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const address = document.getElementById('wallet-address').value;
            const btn = document.getElementById('withdraw-btn');

            // Kondisyon: Montan dwe >= 1.00 epi Balans dwe ase
            if (amount >= 1.00 && amount <= userBalance && address.length > 10) {
                btn.className = "withdraw-btn btn-ready";
                btn.disabled = false;
                btn.innerText = "Confirmer le Retrait";
            } else if (amount < 1.00 && amount > 0) {
                btn.className = "withdraw-btn btn-disabled";
                btn.disabled = true;
                btn.innerText = "Minimum 1.00 USDT";
            } else {
                btn.className = "withdraw-btn btn-disabled";
                btn.disabled = true;
                btn.innerText = "Solde Insuffisant";
            }
        }

        function sendWithdrawRequest() {
            const amount = document.getElementById('withdraw-amount').value;
            const address = document.getElementById('wallet-address').value;
            
            alert(`Demande envoyée !\nMontant: ${amount} USDT\nAdresse: ${address}\n\nVotre demande est en cours de révision.`);
            window.location.href = "index.html";
        }

        window.onload = init;
    </script>
</body>
</html>
